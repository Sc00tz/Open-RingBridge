<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RingBridge{% endblock %} — RingBridge Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <nav class="bg-indigo-700 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
      <span class="font-bold text-lg tracking-wide">RingBridge</span>
      <div class="flex gap-6 text-sm font-medium">
        <a href="/admin/"        class="hover:text-indigo-200 transition-colors">Dashboard</a>
        <a href="/admin/devices" class="hover:text-indigo-200 transition-colors">Devices</a>
        <a href="/admin/settings" class="hover:text-indigo-200 transition-colors">Settings</a>
        <a href="/admin/logout"  class="hover:text-red-300 transition-colors">Logout</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
