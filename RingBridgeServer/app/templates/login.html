<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RingBridge Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-indigo-700 mb-1 text-center">RingBridge</h1>
    <p class="text-gray-500 text-sm text-center mb-6">Admin Login</p>

    {% if error %}
    <div class="bg-red-50 border border-red-300 text-red-700 text-sm rounded-lg px-4 py-2 mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/admin/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
      </div>
      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition-colors text-sm"
      >
        Sign in
      </button>
    </form>
  </div>

</body>
</html>
